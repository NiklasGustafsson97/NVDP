name: Auto cache-bust on deploy

# SECURITY (assessment M10): pin third-party actions to commit SHAs so a
# malicious tag move can't inject code into our release pipeline, and keep
# the default GITHUB_TOKEN scope minimal.

on:
  push:
    branches: [main]
    paths:
      - 'css/**'
      - 'js/**'
      - 'index.html'

permissions:
  contents: write

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Replace version strings with commit hash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/style\.css?v=[a-zA-Z0-9_-]*/style.css?v=${SHORT_SHA}/g" index.html
          sed -i "s/config\.js?v=[a-zA-Z0-9_-]*/config.js?v=${SHORT_SHA}/g" index.html
          sed -i "s/app\.js?v=[a-zA-Z0-9_-]*/app.js?v=${SHORT_SHA}/g" index.html

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push cache-bust
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto cache-bust: v=$(git rev-parse --short HEAD)"
          git push
