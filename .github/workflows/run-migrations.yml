name: Run SQL Migrations

# SECURITY (assessment M10 + migration_logging):
#   * Pin actions to commit SHAs.
#   * Declare minimal permissions at the top, widen only for the commit job.
#   * Use a safer file iteration pattern (no `ls` parsing, handles spaces).
#   * Sanitize failure output so the HTTP response body can't smuggle ANSI
#     escapes or newlines into the GitHub Actions log in a way that hides
#     which migration failed. Also truncate and log the body separately so
#     the `::error::` annotation stays readable.

on:
  push:
    branches: [main]
    paths:
      - 'sql/migrations/*.sql'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # ── Drift detection: surface (but don't fail on) any *.sql files that
      #    aren't yet listed in _applied.txt. The next step will apply them;
      #    this is just a visibility aid in the GitHub Actions log.
      - name: Report pending migrations
        run: |
          set -euo pipefail
          shopt -s nullglob
          APPLIED_FILE="sql/migrations/_applied.txt"
          touch "$APPLIED_FILE"
          pending=0
          for f in sql/migrations/*.sql; do
            BASENAME=$(basename "$f")
            if ! grep -Fxq "$BASENAME" "$APPLIED_FILE"; then
              echo "Pending: $BASENAME"
              pending=$((pending + 1))
            fi
          done
          echo "Pending migration count: $pending"

      - name: Run unapplied migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          APPLIED_FILE="sql/migrations/_applied.txt"
          touch "$APPLIED_FILE"

          FAILED=0
          APPLIED_COUNT=0
          FAILED_FILE=""

          # Glob + sort, quoted to cope with spaces in filenames.
          mapfile -t MIGRATIONS < <(printf '%s\n' sql/migrations/*.sql | LC_ALL=C sort)

          for f in "${MIGRATIONS[@]}"; do
            BASENAME=$(basename "$f")

            if grep -Fxq "$BASENAME" "$APPLIED_FILE"; then
              echo "Already applied: $BASENAME"
              continue
            fi

            echo "Applying: $BASENAME"
            SQL_CONTENT=$(cat "$f")

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$SQL_CONTENT" '{query: $q}')")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Success: $BASENAME (HTTP $HTTP_CODE)"
              echo "$BASENAME" >> "$APPLIED_FILE"
              APPLIED_COUNT=$((APPLIED_COUNT + 1))
            else
              echo "Failed: $BASENAME (HTTP $HTTP_CODE)"
              # Sanitize the upstream body before printing: strip ANSI escape
              # sequences and truncate to 2KB so a long/hostile response body
              # can't obscure log output or smuggle ::error:: annotations.
              SANITIZED_BODY=$(printf '%s' "$BODY" \
                | tr -d '\000-\010\013\014\016-\031' \
                | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' \
                | head -c 2048)
              echo "--- response body (truncated, sanitized) ---"
              echo "$SANITIZED_BODY"
              echo "--- end response body ---"
              FAILED=1
              FAILED_FILE="$BASENAME"
              break
            fi
          done

          echo ""
          echo "Applied $APPLIED_COUNT migration(s)"

          if [ "$FAILED" -eq 1 ]; then
            echo "::error title=Migration failed::${FAILED_FILE}"
            exit 1
          fi

      - name: Commit applied tracking file
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sql/migrations/_applied.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update _applied.txt with new migrations"

          # Retry with rebase to survive races with cache-bust / other workflows
          # that touch main at the same time. The _applied.txt file only ever
          # appends new lines, so a rebase against an unrelated change is safe.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — pulling and retrying"
            git pull --rebase --autostash origin main
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push _applied.txt after 5 attempts"
          exit 1
