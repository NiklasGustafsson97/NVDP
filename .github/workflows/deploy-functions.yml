name: Deploy Supabase Edge Functions

# SECURITY (assessment):
#   * M3 / C-level: `--no-verify-jwt` was previously passed on EVERY function.
#     That means any caller (including anonymous ones) could invoke user-
#     authenticated endpoints like generate-plan / weekly-checkin with no
#     bearer token — the functions only checked auth themselves by inspecting
#     req.headers.authorization, which could be omitted.
#   * Now the default is JWT-verified. Only functions that legitimately need
#     to accept unauthenticated traffic (OAuth callbacks, provider webhooks,
#     scheduled cron) keep `--no-verify-jwt`, and we document why.
#   * CI hardening (assessment M10): actions pinned to commit SHAs, Supabase
#     CLI pinned to a known version, minimal permissions block.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # supabase/setup-cli@v1.6.0 — pinned to a commit so a tag re-point
      # can't silently introduce a malicious CLI into our deploy path.
      # (`version: latest` resolves to whatever Supabase CLI release the
      # action's default points at; pinning a specific CLI release is a
      # nice-to-have tracked as a follow-up.)
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── OAuth callbacks (called by Strava/Garmin redirecting the browser
      #    back to us — the request carries a provider `code` + our DB-
      #    verified `state`, never a Supabase JWT). Must stay --no-verify-jwt.
      - name: Deploy strava-auth
        run: supabase functions deploy strava-auth --no-verify-jwt

      - name: Deploy garmin-auth
        run: supabase functions deploy garmin-auth --no-verify-jwt

      # ── Provider webhooks (Strava / Garmin POST directly to us; they
      #    authenticate via a shared verify-token in the URL, not a JWT).
      - name: Deploy strava-webhook
        run: supabase functions deploy strava-webhook --no-verify-jwt

      - name: Deploy garmin-webhook
        run: supabase functions deploy garmin-webhook --no-verify-jwt

      # ── Cron-triggered reminder (pg_cron invokes it with the service-role
      #    key, not a user JWT). Keep --no-verify-jwt, but the function itself
      #    checks a shared CRON_SECRET header before running.
      - name: Deploy weekly-checkin-reminder
        run: supabase functions deploy weekly-checkin-reminder --no-verify-jwt

      # ── User-facing endpoints.
      #
      # NOTE (2026-04-18 — Supabase ES256 gateway limitation):
      #   This project uses Supabase's new asymmetric JWT signing keys (ES256 /
      #   `sb_publishable_…` publishable keys). The Edge Functions gateway's
      #   built-in `--verify-jwt` implementation only supports the legacy
      #   HS256 symmetric secret and therefore rejects every valid access
      #   token with "UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM: Unsupported
      #   JWT algorithm ES256".
      #
      #   Until Supabase ships ES256 support in the gateway, we deploy these
      #   functions WITH `--no-verify-jwt`. Security is still enforced:
      #   each of these functions immediately calls
      #   `createClient(…, { global: { headers: { Authorization } } }).auth.getUser()`
      #   (or the equivalent) as its first step and returns 401 if the JWT
      #   is missing/invalid/expired — and that path goes through Supabase
      #   Auth, which understands ES256. The gateway check was defence-in-
      #   depth, not the primary gate.
      #
      #   When Supabase adds ES256 support, remove the --no-verify-jwt flag
      #   from the lines below and redeploy.
      - name: Deploy strava-sync
        run: supabase functions deploy strava-sync --no-verify-jwt

      - name: Deploy garmin-sync
        run: supabase functions deploy garmin-sync --no-verify-jwt

      - name: Deploy generate-plan
        run: supabase functions deploy generate-plan --no-verify-jwt

      - name: Deploy weekly-template-ai
        run: supabase functions deploy weekly-template-ai --no-verify-jwt

      - name: Deploy send-nudge-email
        run: supabase functions deploy send-nudge-email --no-verify-jwt

      - name: Deploy weekly-checkin
        run: supabase functions deploy weekly-checkin --no-verify-jwt

      - name: Deploy oauth-state
        run: supabase functions deploy oauth-state --no-verify-jwt

      # ── Conversational coach (user JWT, same ES256 caveat as the rest of
      #    the user-facing endpoints).
      - name: Deploy coach-chat
        run: supabase functions deploy coach-chat --no-verify-jwt

      # ── Coach proactive nudges (cron-triggered, same shared CRON_SECRET
      #    pattern as weekly-checkin-reminder). Keep --no-verify-jwt; the
      #    function checks CRON_SECRET / service-role itself.
      - name: Deploy coach-nudge
        run: supabase functions deploy coach-nudge --no-verify-jwt

      # ── Plan editing endpoints (user JWT, same ES256 caveat as the rest of
      #    the user-facing endpoints).
      - name: Deploy assess-feasibility
        run: supabase functions deploy assess-feasibility --no-verify-jwt

      - name: Deploy move-plan-workout
        run: supabase functions deploy move-plan-workout --no-verify-jwt

      - name: Deploy swap-plan-days
        run: supabase functions deploy swap-plan-days --no-verify-jwt

      # ── Drift check: every function with an index.ts MUST be deployed by
      #    one of the steps above. If you add a new function, add a deploy
      #    step for it (or this job fails on next push).
      - name: Verify all functions have a deploy step
        run: |
          set -euo pipefail
          # NOTE: do NOT name this variable GITHUB_WORKFLOW — that's a reserved
          # GitHub Actions env var (holds the workflow name, not a path) and
          # step-level env overrides for reserved names are silently ignored,
          # which used to make the grep below match against a nonexistent file
          # and produce false "no deploy step" errors.
          WF_FILE="${GITHUB_WORKSPACE}/.github/workflows/deploy-functions.yml"
          missing=0
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            # Skip the _shared module and anything without an index.ts.
            [ "$name" = "_shared" ] && continue
            [ -f "$dir/index.ts" ] || continue
            if ! grep -Eq "supabase functions deploy $name( |$)" "$WF_FILE"; then
              echo "::error::Function '$name' has no deploy step in deploy-functions.yml"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
